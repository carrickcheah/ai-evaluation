name: Flabee CK — Contabo (production bot)

# Continuous-Knowledge dataset (243) run against the LIVE Contabo production bot
# (account 14), which has the full faqs + website_knowledge. Note: the bot does
# NOT read kb_articles directly, so CK-only facts may still fail — but prod's
# complete knowledge base covers much of the overlap.
target:
  url: https://api.nexgpt.nexerp.io/api/chat/sync
  method: POST
  headers:
    X-API-Key: "${BOT_KEY}"
  body:
    message: "{{input}}"
    phone_number: "{{uid}}"
    source: api
    account_id: 14
    session_id: "{{uid}}"
  answerPath: output

judge:
  provider: claude-subscription
  model: sonnet

rubric: |
  You grade the Flabee/Sonobee (account 14) customer-service bot answer against a
  known-correct reference from its knowledge base.
  PASS only if the answer is factually consistent with the reference and addresses
  the question, in the same language as the reference (Malay/English/Manglish).
  FAIL on any contradiction, a missing required fact (price, gestational week, duration,
  step), or an invented detail not supported by the reference. Minor wording/formatting
  differences are fine.

dataset: ./dataset.json
